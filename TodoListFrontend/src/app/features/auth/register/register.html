<h1 class="register-title">Đăng ký tài khoản</h1>

<form class="register-form">
    <div class="leaf-field">
        <input type="text" id="username" placeholder="Tên của bạn..." />
    </div>

    <div class="leaf-field">
        <input type="email" id="email" placeholder="Email của bạn..." />
    </div>

    <div class="leaf-field">
        <input type="password" id="password" placeholder="Mật khẩu an toàn..." />
    </div>

    <button type="submit" class="btn-register">
        🌱 Tạo tài khoản mới
    </button>

</form>

<p class="auth-switch">
    Đã có tài khoản? <a href="/login">Đăng nhập ngay</a>
</p>
