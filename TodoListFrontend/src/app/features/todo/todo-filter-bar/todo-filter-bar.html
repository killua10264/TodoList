<div class="filter-bar">
    <input type="text" placeholder="🔍 Tìm kiếm..." [(ngModel)]="searchText" (input)="onFilterChange()" />
    <select [(ngModel)]="selectedPriority" (change)="onFilterChange()">
        <option [value]="0">Tất cả ưu tiên</option>
        <option [value]="1">Thấp</option>
        <option [value]="2">Trung bình</option>
        <option [value]="3">Cao</option>
    </select>
    <select [(ngModel)]="selectedProject" (change)="onFilterChange()">
        <option [value]="0">Tất cả dự án</option>
        @for (proj of projects(); track proj.id) {
        <option [value]="proj.id">{{ proj.name }}</option>
        }
    </select>
</div>
