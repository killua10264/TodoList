<div class="todo-list-page">
  <div class="filter-toolbar">
    <div class="filter-group">
      <select [ngModel]="selectedProjectId()" (ngModelChange)="selectedProjectId.set($event); onFilterChanged()" class="zen-select">
        <option [ngValue]="null">Tất cả dự án</option>
        @for (proj of projects(); track proj.id) {
        <option [ngValue]="proj.id">{{ proj.name }}</option>
        }
      </select>

      <select [ngModel]="selectedStatus()" (ngModelChange)="selectedStatus.set($event); onFilterChanged()" class="zen-select">
        <option value="all">Tất cả trạng thái</option>
        <option value="pending">Đang ươm mầm (Chưa xong)</option>
        <option value="completed">Đã nở hoa (Hoàn thành)</option>
      </select>
    </div>

    <div class="sort-group">
      <select [ngModel]="selectedSort()" (ngModelChange)="selectedSort.set($event); onFilterChanged()" class="zen-select sort-select">
        <option value="dueDate">Hạn chót gần nhất</option>
        <option value="priorityDesc">Ưu tiên cao nhất</option>
      </select>
    </div>
  </div>

  @if (isLoading()) {
  <app-loading-spinner />
  } @else if (todos().length === 0) {
  <div class="empty-state">
    <p>📭 Chưa có công việc nào. Hãy gieo hạt giống đầu tiên!</p>
  </div>
  } @else {
  <div class="todo-grid">
    @for (todo of todos(); track todo.id) {
    <app-todo-item [todo]="todo" (toggled)="onTodoToggled($event)" (edited)="openEditForm($event)"
      (deleted)="onDeleteRequested($event)" />
    }
  </div>

  @if (totalCount() > pageSize) {
  <app-pagination [currentPage]="currentPage()" [totalCount]="totalCount()" [pageSize]="pageSize"
    (pageChanged)="onPageChanged($event)" />
  }
  }

  <button class="btn-fab-add" (click)="openCreateForm()" title="Thêm một hạt giống mới">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
  </button>

  @if (showForm) {
  <app-todo-form-dialog [todo]="editingTodo" [projects]="projects()" (saved)="onFormSaved()"
    (cancelled)="showForm = false" (deleted)="onDeleteFromForm($event)" />
  }

  @if (showProjectForm) {
  <app-project-form-dialog (saved)="onProjectFormSaved()" (cancelled)="showProjectForm = false" />
  }

  <app-confirm-dialog [visible]="showDeleteConfirm" message="Bạn có chắc muốn xóa công việc này?"
    (confirmed)="onDeleteConfirmed($event)" />
</div>
