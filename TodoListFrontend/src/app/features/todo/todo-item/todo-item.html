<div class="todo-card" [class.completed]="todo().isCompleted" (click)="onCardClick($event)">
  @if (todo().isCompleted) {
  <img src="assets/images/flower.svg" alt="completed" class="flower-badge" />
  }

  <div class="card-content">
    <span class="todo-title" [class.completed-title]="todo().isCompleted">{{ todo().title }}</span>
  </div>

  <div class="card-actions">
    <button type="button" class="btn-card-delete" (click)="onDelete($event)" title="Xóa công việc">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    </button>

    <div class="card-checkbox" (click)="onToggle($event)">
      @if (todo().isCompleted) {
      <span class="check-mark">✓</span>
      }
    </div>
  </div>
</div>
