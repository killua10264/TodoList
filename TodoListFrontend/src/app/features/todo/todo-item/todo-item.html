<div class="todo-card" [class.completed]="todo().isCompleted" (click)="onCardClick($event)" title="Nhấn để xem cây công việc chi tiết">
  @if (todo().isCompleted) {
    <img src="assets/images/flower.svg" alt="completed" class="flower-badge" />
  }

  <div class="card-content">
    <span class="todo-title" [class.completed-title]="todo().isCompleted">{{ todo().title }}</span>
    @if (todo().categoryName) {
      <div class="todo-category-badge" [class.completed-badge]="todo().isCompleted">
        <span class="cat-mini-dot" [style.backgroundColor]="todo().categoryColor || '#8a8570'"></span>
        <span class="cat-badge-text">{{ todo().categoryName }}</span>
      </div>
    }
  </div>

  <div class="card-actions">
        <button type="button" class="btn-card-edit" (click)="onEdit($event)" title="Chỉnh sửa thông tin công việc">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="1"></circle>
        <circle cx="19" cy="12" r="1"></circle>
        <circle cx="5" cy="12" r="1"></circle>
      </svg>
    </button>

        <button type="button" class="btn-card-delete" (click)="onDelete($event)" title="Xóa công việc">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    </button>

        <div class="card-checkbox" (click)="onToggle($event)" title="Đánh dấu hoàn thành">
      @if (todo().isCompleted) {
        <span class="check-mark">✓</span>
      }
    </div>
  </div>
</div>
