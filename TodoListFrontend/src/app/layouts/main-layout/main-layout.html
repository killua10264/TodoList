<div class="zen-layout">
  <app-main-header
    [pageTitle]="pageTitle()"
    [headerAvatarUrl]="headerAvatarUrl()"
    [headerAvatarInitials]="headerAvatarInitials()"
    (onLogout)="onLogout()"
  />

    <div class="zen-body">
    <app-main-sidebar
      [pageTitle]="pageTitle()"
      [categories]="categories()"
      [activeCategoryMenuId]="activeCategoryMenuId"
      [sidebarTodos]="sidebarTodos()"
      [sidebarPage]="sidebarPage()"
      [sidebarTotalPages]="sidebarTotalPages()"
      (onCreateCategory)="openCreateCategoryModal()"
      (onToggleCategoryMenu)="toggleCategoryMenu($event)"
      (onDeleteCategory)="onDeleteSidebarCategory($event)"
      (onToggleTodo)="onToggleSidebarTodo($event)"
      (onPrevPage)="sidebarPrevPage()"
      (onNextPage)="sidebarNextPage()"
    />

    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>

@if (showCategoryModal) {
<app-category-form-dialog (saved)="onCategoryCreated()" (cancelled)="showCategoryModal = false" />
}

@if (showDeleteCategoryConfirm) {
<app-confirm-dialog
  [visible]="true"
  title="Xác nhận nhổ bỏ luống hoa (danh mục)"
  [message]="'Bạn có chắc chắn muốn xóa danh mục &quot;' + (deletingCategory?.name || '') + '&quot; không? Toàn bộ công việc bên trong sẽ được chuyển giao an toàn sang danh mục &quot;Khác&quot; để bảo toàn dữ liệu.'"
  (confirmed)="onDeleteCategoryConfirmed($event)"
/>
}
