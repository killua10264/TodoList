<aside class="zen-sidebar">
    <div class="vine-separator" [class.visible]="vineVisible()" [style.top]="vineTop()">
    <img src="assets/images/vine-separator.svg" alt="separator" class="vine-img" />
  </div>

    <a routerLink="/todos" [class.active]="pageTitle() === 'Tất cả công việc'" class="nav-item">
    <img src="assets/images/leaf.svg" alt="" class="leaf-icon-img" />
    <span class="nav-text">Tất cả công việc</span>
  </a>

    <a routerLink="/todos" [queryParams]="{filter: 'today'}" [class.active]="pageTitle() === 'Hôm nay'"
    class="nav-item">
    <img src="assets/images/leaf.svg" alt="" class="leaf-icon-img" />
    <span class="nav-text">Hôm nay</span>
  </a>

    <a routerLink="/todos" [queryParams]="{filter: 'upcoming'}" [class.active]="pageTitle() === 'Sắp tới'"
    class="nav-item">
    <img src="assets/images/leaf.svg" alt="" class="leaf-icon-img" />
    <span class="nav-text">Sắp tới</span>
  </a>

    <a routerLink="/categories" [class.active]="pageTitle() === 'Khu vườn Danh mục' || pageTitle() === 'Báo cáo' || pageTitle() === 'Danh mục'" class="nav-item">
    <img src="assets/images/leaf.svg" alt="" class="leaf-icon-img" />
    <span class="nav-text">Khu vườn Danh mục</span>
  </a>

    <div class="sidebar-categories">
    <div class="categories-header">
      <a routerLink="/categories" class="categories-header-link" title="Mở trang quản lý toàn bộ Khu vườn Danh mục">
        <h3 class="categories-title">Danh mục</h3>
      </a>
      <button type="button" class="btn-add-category" (click)="handleCreateCategory()" title="Thêm danh mục mới">+</button>
    </div>
    <div class="categories-list">
      @for (cat of categories(); track cat.id) {
      <div class="category-row-wrapper">
        <a class="category-nav-item" [routerLink]="['/todos']" [queryParams]="{categoryId: cat.id}" [class.active]="pageTitle() === cat.name">
          <span class="category-dot" [style.backgroundColor]="cat.color || '#6b7a45'"></span>
          <span class="category-name">{{ cat.name }}</span>
          @if (cat.todoCount !== undefined && cat.todoCount > 0) {
          <span class="category-badge">{{ cat.todoCount }}</span>
          }
        </a>
        <button type="button" class="btn-cat-more-actions" (click)="handleToggleCategoryMenu($event, cat)" title="Tùy chọn danh mục...">···</button>

        @if (activeCategoryMenuId() === cat.id) {
        <div class="category-options-menu" (click)="$event.stopPropagation()">
          <button type="button" class="cat-option-btn delete-option" (click)="handleDeleteCategory($event, cat)">
            🗑️ Xóa danh mục
          </button>
        </div>
        }
      </div>
      }
    </div>
  </div>

</aside>
